<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vincera Events</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Manrope", sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top left, rgba(137,86,255,0.22), transparent 35%),
    radial-gradient(circle at bottom right, rgba(80,210,255,0.12), transparent 35%),
    #10071f;
  color:white;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:380px;
  height:380px;
  background:rgba(118,80,255,0.18);
  filter:blur(80px);
  border-radius:50%;
  animation:bgMove 6s infinite alternate ease-in-out;
}

@keyframes bgMove{
  from{ transform:translate(-250px,-120px); }
  to{ transform:translate(250px,120px); }
}

.page{
  width:90%;
  max-width:1400px;
  height:80vh;
  position:relative;
  animation:pageLoad .7s ease;
}

@keyframes pageLoad{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.logo{
  position:absolute;
  top:0;
  left:0;
  font-size:40px;
  font-weight:800;
  text-shadow:0 0 18px rgba(255,255,255,0.25);
  animation:logoGlow 2.5s infinite alternate;
}

@keyframes logoGlow{
  from{ text-shadow:0 0 10px rgba(255,255,255,0.25); }
  to{ text-shadow:0 0 28px rgba(160,120,255,0.85); }
}

.search-box{
  position:absolute;
  top:10px;
  right:0;
  width:320px;
  height:40px;
  border:1px solid rgba(255,255,255,.75);
  border-radius:25px;
  background:rgba(46,41,63,0.85);
  color:white;
  outline:none;
  padding-left:20px;
  font-size:14px;
  backdrop-filter:blur(12px);
  transition:.3s;
}

.search-box:focus{
  border-color:#bba6ff;
  box-shadow:0 0 18px rgba(150,110,255,0.6);
  transform:scale(1.03);
}

.cards{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  display:flex;
  gap:50px;
}

.event-card{
  width:320px;
  height:180px;
  background:rgba(46,41,63,0.86);
  border:1px solid rgba(255,255,255,.75);
  border-radius:18px;
  position:relative;
  padding:16px;
  transition:0.35s;
  backdrop-filter:blur(15px);
  overflow:hidden;
  animation:cardEntry .7s ease both;
}

.event-card:nth-child(1){ animation-delay:.1s; }
.event-card:nth-child(2){ animation-delay:.25s; }
.event-card:nth-child(3){ animation-delay:.4s; }

@keyframes cardEntry{
  from{
    opacity:0;
    transform:translateY(35px) scale(.92);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.event-card::before{
  content:"";
  position:absolute;
  top:-60%;
  left:-80%;
  width:70%;
  height:220%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
  transform:rotate(25deg);
  transition:.6s;
}

.event-card:hover::before{
  left:120%;
}

.event-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 18px 35px rgba(0,0,0,0.55),
             0 0 25px rgba(160,120,255,0.35);
  border-color:#c7b6ff;
}

.event-card h3{
  font-size:18px;
  font-weight:600;
}

.join-btn{
  position:absolute;
  left:16px;
  bottom:14px;
  width:80px;
  height:30px;
  border:1px solid white;
  border-radius:20px;
  background:#10071f;
  color:white;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.join-btn:hover{
  background:white;
  color:#10071f;
  box-shadow:0 0 16px rgba(255,255,255,0.6);
}

.date{
  position:absolute;
  right:18px;
  bottom:14px;
  font-size:13px;
  line-height:1.2;
  font-weight:600;
  text-align:right;
}

.schedule-btn{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:280px;
  height:45px;
  border:none;
  border-radius:30px;
  background:#2e293f;
  color:white;
  font-size:15px;
  font-weight:600;
  box-shadow:0 6px 0 rgba(0,0,0,.35);
  cursor:pointer;
  transition:.3s;
  overflow:hidden;
}

.schedule-btn:hover{
  transform:translateX(-50%) scale(1.07);
  box-shadow:0 8px 20px rgba(120,90,255,0.55);
  background:#3a3154;
}

.schedule-btn:active{
  transform:translateX(-50%) scale(.96);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:.35s ease;
  backdrop-filter:blur(0px);
}

.modal.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  backdrop-filter:blur(8px);
}

.modal-box{
  width:380px;
  background:rgba(39,30,62,0.95);
  padding:25px;
  border-radius:18px;
  color:#111;
  transform:scale(.78) translateY(35px);
  opacity:0;
  transition:.35s ease;
  border:1px solid rgba(255,255,255,0.22);
  box-shadow:0 25px 60px rgba(0,0,0,0.55);
}

.modal.show .modal-box{
  transform:scale(1) translateY(0);
  opacity:1;
}

.modal-box h2{
  text-align:center;
  margin-bottom:20px;
  font-size:18px;
  font-weight:700;
  color:#e4e7e7;
}

.modal-box label{
  display:block;
  margin-top:10px;
  font-size:13px;
  font-weight:500;
  color:#d2d0d5;
}

.modal-box input{
  width:100%;
  height:40px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #aaa;
  padding-left:12px;
  font-size:13px;
  outline:none;
  transition:.3s;
}

.modal-box input:focus{
  border-color:#a98cff;
  box-shadow:0 0 12px rgba(169,140,255,0.6);
}

.modal-actions{
  margin-top:25px;
  display:flex;
  justify-content:space-between;
}

.cancel-btn{
  width:120px;
  height:40px;
  border-radius:10px;
  border:1px solid #aaa;
  background:#ddd;
  cursor:pointer;
  transition:.3s;
}

.create-btn{
  width:150px;
  height:40px;
  border-radius:10px;
  border:none;
  background:#2e293f;
  color:white;
  cursor:pointer;
  transition:.3s;
}

.cancel-btn:hover{
  background:white;
}

.create-btn:hover{
  background:#4b3d72;
  box-shadow:0 0 16px rgba(160,120,255,0.6);
}

.cancel-btn:active,
.create-btn:active{
  transform:scale(.94);
}

@keyframes newCardPop{
  from{
    opacity:0;
    transform:translateY(35px) scale(.85);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.new-card{
  animation:newCardPop .45s ease;
}
</style>
</head>

<body>

<div class="page">
  <h1 class="logo">Vincera</h1>

  <input type="text" class="search-box" placeholder="Search events...">

  <div class="cards" id="cards">
    <div class="event-card">
      <h3>AI Conference</h3>
      <button class="join-btn" onclick="joinEvent('AI Conference')">Join</button>
      <p class="date">April<br>20 2026</p>
    </div>

    <div class="event-card">
      <h3>Business startup</h3>
      <button class="join-btn" onclick="joinEvent('Business startup')">Join</button>
      <p class="date">May<br>24 2026</p>
    </div>

    <div class="event-card">
      <h3>UX Masterclass</h3>
      <button class="join-btn" onclick="joinEvent('UX Masterclass')">Join</button>
      <p class="date">June<br>2 2026</p>
    </div>
  </div>

  <button class="schedule-btn" type="button" onclick="openModal()">Schedule Event</button>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h2>Schedule New Event</h2>

    <label>Event Title</label>
    <input type="text" id="title" placeholder="Enter event name">

    <label>Date</label>
    <input type="date" id="date">

    <label>Time</label>
    <input type="time" id="time">

    <label>Event Type</label>
    <input type="text" id="type" placeholder="Meeting" value="Meeting">

    <div class="modal-actions">
      <button class="cancel-btn" type="button" onclick="closeModal()">Cancel</button>
      <button class="create-btn" type="button" onclick="createEvent()">Schedule</button>
    </div>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");

  document.getElementById("title").value = "";
  document.getElementById("date").value = "";
  document.getElementById("time").value = "";
  document.getElementById("type").value = "Meeting";
}

function createEvent(){
  let title = document.getElementById("title").value.trim();
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;

  if(title === "" || date === "" || time === ""){
    alert("Please fill all fields");
    return;
  }

  let d = new Date(date + "T00:00:00");

  if(isNaN(d)){
    alert("Invalid date");
    return;
  }

  let month = d.toLocaleString("en-US", {month:"long"});
  let day = d.getDate();
  let year = d.getFullYear();

  let card = document.createElement("div");
  card.className = "event-card new-card";

  card.innerHTML = `
    <h3>${title}</h3>
    <button class="join-btn" type="button" onclick="joinEvent('${title}')">Join</button>
    <p class="date">${month}<br>${day} ${year}</p>
  `;

  document.getElementById("cards").appendChild(card);

  closeModal();

  setTimeout(function(){
    alert("Event Scheduled Successfully ✅");
  }, 200);
}

function joinEvent(eventName){
  alert("Joining " + eventName);
}

window.onclick = function(event){
  let modal = document.getElementById("modal");

  if(event.target === modal){
    closeModal();
  }
}
</script>

</body>
</html>
